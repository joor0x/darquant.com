<svg width="240" height="240" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Darquant mark">
  <g stroke="#2FE3A8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- trunk -->
    <path d="M28 54 L28 42"/>
    <!-- primary forks -->
    <path d="M28 42 L17 32"/>
