  <!-- nodes -->
  <g fill="#2FE3A8">
    <circle cx="28" cy="54" r="2.3"/>
    <circle cx="28" cy="42" r="2.3"/>
    <circle cx="17" cy="32" r="2.3"/>
    <circle cx="41" cy="31" r="2.3"/>
    <circle cx="12" cy="22" r="3.1"/>
    <circle cx="23" cy="20" r="3.1"/>
    <circle cx="37" cy="18" r="3.1"/>
  </g>
  <!-- fittest terminal node -->
  <circle cx="51" cy="12" r="4.2" fill="#7B6CFF"/>
  <circle cx="51" cy="12" r="6.4" fill="none" stroke="#7B6CFF" stroke-width="1.2" opacity="0.5"/>
